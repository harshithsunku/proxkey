name: build

on:
  push:
    branches: [main, master]
    tags: ['v*']
  pull_request:
    branches: [main, master]
  workflow_dispatch:

permissions:
  contents: write
  packages: write

env:
  REGISTRY: ghcr.io
  IMAGE_OWNER: ${{ github.repository_owner }}

jobs:
  # ---------------------------------------------------------------
  # Backend image — FastAPI + uvicorn
  # ---------------------------------------------------------------
  build-backend:
    name: backend (${{ matrix.platform }})
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        include:
          - platform: linux/amd64
            platform_tag: amd64
          - platform: linux/arm64
            platform_tag: arm64
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Read version
        id: ver
        shell: bash
        run: |
          VERSION="$(tr -d '[:space:]' < VERSION)"
          echo "version=${VERSION}" >> "$GITHUB_OUTPUT"

      - name: Set up QEMU
        uses: docker/setup-qemu-action@v3

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Lowercase owner
        id: owner
        shell: bash
        run: echo "name=$(echo '${{ env.IMAGE_OWNER }}' | tr '[:upper:]' '[:lower:]')" >> "$GITHUB_OUTPUT"

      - name: Log in to GHCR
        if: github.event_name != 'pull_request'
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Compute tags
        id: tags
        shell: bash
        run: |
          IMG="${{ env.REGISTRY }}/${{ steps.owner.outputs.name }}/proxkey-backend"
          VER="${{ steps.ver.outputs.version }}"
          PLAT="${{ matrix.platform_tag }}"
          TAGS="${IMG}:${VER}-${PLAT}"
          if [[ "${GITHUB_REF}" == refs/heads/main || "${GITHUB_REF}" == refs/heads/master ]]; then
            TAGS="${TAGS},${IMG}:main-${PLAT}"
          fi
          if [[ "${GITHUB_REF}" == refs/tags/v* ]]; then
            TAGS="${TAGS},${IMG}:latest-${PLAT}"
          fi
          echo "tags=${TAGS}" >> "$GITHUB_OUTPUT"

      - name: Build and push backend
        uses: docker/build-push-action@v5
        with:
          context: ./backend
          file: ./backend/Dockerfile
          platforms: ${{ matrix.platform }}
          push: ${{ github.event_name != 'pull_request' }}
          tags: ${{ steps.tags.outputs.tags }}
          cache-from: type=gha,scope=backend-${{ matrix.platform_tag }}
          cache-to:   type=gha,scope=backend-${{ matrix.platform_tag }},mode=max

  # ---------------------------------------------------------------
  # Frontend image — nginx serving the Vite build
  # ---------------------------------------------------------------
  build-frontend:
    name: frontend (${{ matrix.platform }})
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        include:
          - platform: linux/amd64
            platform_tag: amd64
          - platform: linux/arm64
            platform_tag: arm64
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Read version
        id: ver
        shell: bash
        run: echo "version=$(tr -d '[:space:]' < VERSION)" >> "$GITHUB_OUTPUT"

      - name: Set up QEMU
        uses: docker/setup-qemu-action@v3

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Lowercase owner
        id: owner
        shell: bash
        run: echo "name=$(echo '${{ env.IMAGE_OWNER }}' | tr '[:upper:]' '[:lower:]')" >> "$GITHUB_OUTPUT"

      - name: Log in to GHCR
        if: github.event_name != 'pull_request'
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Compute tags
        id: tags
        shell: bash
        run: |
          IMG="${{ env.REGISTRY }}/${{ steps.owner.outputs.name }}/proxkey-frontend"
          VER="${{ steps.ver.outputs.version }}"
          PLAT="${{ matrix.platform_tag }}"
          TAGS="${IMG}:${VER}-${PLAT}"
          if [[ "${GITHUB_REF}" == refs/heads/main || "${GITHUB_REF}" == refs/heads/master ]]; then
            TAGS="${TAGS},${IMG}:main-${PLAT}"
          fi
          if [[ "${GITHUB_REF}" == refs/tags/v* ]]; then
            TAGS="${TAGS},${IMG}:latest-${PLAT}"
          fi
          echo "tags=${TAGS}" >> "$GITHUB_OUTPUT"

      - name: Build and push frontend
        uses: docker/build-push-action@v5
        with:
          context: ./frontend
          file: ./frontend/Dockerfile
          platforms: ${{ matrix.platform }}
          push: ${{ github.event_name != 'pull_request' }}
          tags: ${{ steps.tags.outputs.tags }}
          cache-from: type=gha,scope=frontend-${{ matrix.platform_tag }}
          cache-to:   type=gha,scope=frontend-${{ matrix.platform_tag }},mode=max

  # ---------------------------------------------------------------
  # Stitch per-arch tags into multi-arch manifests
  # ---------------------------------------------------------------
  manifest:
    name: manifest
    if: github.event_name != 'pull_request'
    needs: [build-backend, build-frontend]
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Read version
        id: ver
        shell: bash
        run: echo "version=$(tr -d '[:space:]' < VERSION)" >> "$GITHUB_OUTPUT"

      - name: Lowercase owner
        id: owner
        shell: bash
        run: echo "name=$(echo '${{ env.IMAGE_OWNER }}' | tr '[:upper:]' '[:lower:]')" >> "$GITHUB_OUTPUT"

      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Create multi-arch manifests
        shell: bash
        run: |
          set -e
          VER="${{ steps.ver.outputs.version }}"
          OWNER="${{ steps.owner.outputs.name }}"

          for component in backend frontend; do
            IMG="${{ env.REGISTRY }}/${OWNER}/proxkey-${component}"

            # Versioned manifest
            docker buildx imagetools create \
              -t "${IMG}:${VER}" \
              "${IMG}:${VER}-amd64" \
              "${IMG}:${VER}-arm64"

            # main floating tag
            if [[ "${GITHUB_REF}" == refs/heads/main || "${GITHUB_REF}" == refs/heads/master ]]; then
              docker buildx imagetools create \
                -t "${IMG}:main" \
                "${IMG}:main-amd64" \
                "${IMG}:main-arm64"
            fi

            # latest on tagged releases
            if [[ "${GITHUB_REF}" == refs/tags/v* ]]; then
              docker buildx imagetools create \
                -t "${IMG}:latest" \
                "${IMG}:latest-amd64" \
                "${IMG}:latest-arm64"
            fi
          done

  # ---------------------------------------------------------------
  # Release on tag push
  # ---------------------------------------------------------------
  release:
    name: release
    if: startsWith(github.ref, 'refs/tags/v')
    needs: [manifest]
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Read version
        id: ver
        shell: bash
        run: echo "version=$(tr -d '[:space:]' < VERSION)" >> "$GITHUB_OUTPUT"

      - name: Lowercase owner
        id: owner
        shell: bash
        run: echo "name=$(echo '${{ env.IMAGE_OWNER }}' | tr '[:upper:]' '[:lower:]')" >> "$GITHUB_OUTPUT"

      - name: Generate release notes
        id: notes
        shell: bash
        run: |
          VERSION="${{ steps.ver.outputs.version }}"
          OWNER="${{ steps.owner.outputs.name }}"
          CHANGELOG_BODY="$(awk -v v="${VERSION}" '
            $0 ~ "^## \\[" v "\\]" { capture=1; next }
            capture && /^## \[/ { exit }
            capture { print }
          ' CHANGELOG.md || true)"

          {
            echo "## ProxKey ${VERSION}"
            echo
            echo "Self-hosted SSH key manager for Proxmox LXC containers and QEMU VMs."
            if [ -n "${CHANGELOG_BODY}" ]; then
              echo
              echo "### Highlights"
              echo
              echo "${CHANGELOG_BODY}"
            fi
            echo
            echo "### Container images"
            echo
            echo "Multi-arch (linux/amd64 + linux/arm64) images published to GHCR:"
            echo
            echo '```'
            echo "ghcr.io/${OWNER}/proxkey-backend:${VERSION}"
            echo "ghcr.io/${OWNER}/proxkey-frontend:${VERSION}"
            echo "ghcr.io/${OWNER}/proxkey-backend:latest"
            echo "ghcr.io/${OWNER}/proxkey-frontend:latest"
            echo '```'
            echo
            echo "### Usage"
            echo
            echo '```bash'
            echo "curl -fsSL https://github.com/${{ github.repository }}/releases/download/v${VERSION}/docker-compose.yml -o docker-compose.yml"
            echo "cp .env.example .env  # edit with your Proxmox credentials"
            echo "docker compose up -d"
            echo "# UI: http://localhost:8080"
            echo '```'
          } > release_notes.md
          cat release_notes.md

      - name: Stage release assets
        shell: bash
        run: |
          mkdir -p release
          cp docker-compose.yml release/
          cp .env.example release/
          cp VERSION release/

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          body_path: release_notes.md
          files: |
            release/docker-compose.yml
            release/.env.example
            release/VERSION
          fail_on_unmatched_files: true
