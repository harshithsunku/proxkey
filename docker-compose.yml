services:
  backend:
    build: ./backend
    container_name: proxkey-backend
    restart: unless-stopped
    env_file: .env
    volumes:
      - db_data:/app/data
    ports:
      - "8000:8000"
    environment:
      - DATABASE_URL=sqlite:///./data/proxkey.db

  frontend:
    build: ./frontend
    container_name: proxkey-frontend
    restart: unless-stopped
    ports:
      - "8080:80"
    depends_on:
      - backend

volumes:
  db_data:
