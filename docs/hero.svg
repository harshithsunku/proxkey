<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 340" role="img" aria-label="ProxKey — SSH key manager for Proxmox LXC and VMs">
  <title>ProxKey</title>
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#0b0f14"/>
      <stop offset="1" stop-color="#131c2b"/>
    </linearGradient>
    <linearGradient id="titleFill" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0" stop-color="#f0f6fc"/>
      <stop offset="1" stop-color="#c9d1d9"/>
    </linearGradient>
    <linearGradient id="keyRing" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#58a6ff"/>
      <stop offset="1" stop-color="#c084fc"/>
    </linearGradient>
    <filter id="softShadow" x="-50%" y="-50%" width="200%" height="200%">
      <feGaussianBlur in="SourceAlpha" stdDeviation="6"/>
      <feOffset dx="0" dy="3" result="offset"/>
      <feComponentTransfer><feFuncA type="linear" slope="0.5"/></feComponentTransfer>
      <feMerge><feMergeNode/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
  </defs>

  <!-- Background -->
  <rect width="1200" height="340" fill="url(#bg)"/>

  <!-- Subtle scan grid -->
  <g stroke="#1a2332" stroke-width="1" opacity="0.45">
    <line x1="0" y1="80"  x2="1200" y2="80"/>
    <line x1="0" y1="160" x2="1200" y2="160"/>
    <line x1="0" y1="240" x2="1200" y2="240"/>
  </g>

  <!-- Corner dots -->
  <g fill="#30363d">
    <circle cx="24" cy="24" r="3"/>
    <circle cx="1176" cy="24" r="3"/>
    <circle cx="24" cy="316" r="3"/>
    <circle cx="1176" cy="316" r="3"/>
  </g>

  <!-- Logo mark: stylized key (bow on the left, teeth on the right) -->
  <g transform="translate(72, 120)" filter="url(#softShadow)">
    <!-- key bow (round head) -->
    <circle cx="0" cy="0" r="34" fill="none" stroke="url(#keyRing)" stroke-width="6"/>
    <circle cx="0" cy="0" r="8" fill="#c084fc" opacity="0.85"/>
    <!-- key shaft -->
    <rect x="30" y="-6" width="60" height="12" rx="3" fill="#58a6ff"/>
    <!-- key teeth -->
    <rect x="74" y="6" width="6" height="14" rx="1" fill="#58a6ff"/>
    <rect x="86" y="6" width="6" height="10" rx="1" fill="#58a6ff"/>
  </g>

  <!-- Title -->
  <text x="200" y="140" font-family="system-ui, -apple-system, Segoe UI, Roboto, sans-serif"
        font-size="80" font-weight="800" fill="url(#titleFill)" letter-spacing="-2">ProxKey</text>

  <!-- Tagline -->
  <text x="202" y="182" font-family="system-ui, -apple-system, Segoe UI, Roboto, sans-serif"
        font-size="22" fill="#8b949e">
    SSH keys, distributed to every <tspan fill="#58a6ff" font-weight="600">Proxmox</tspan> container. Zero-bootstrap.
  </text>

  <!-- Feature badges -->
  <g font-family="ui-monospace, 'SF Mono', Menlo, Consolas, monospace" font-size="13"
     transform="translate(202, 220)">
    <g>
      <rect x="0" y="0" width="108" height="28" rx="6" fill="#161b22" stroke="#30363d"/>
      <text x="54" y="19" text-anchor="middle" fill="#3fb950">zero-bootstrap</text>
    </g>
    <g transform="translate(118, 0)">
      <rect x="0" y="0" width="110" height="28" rx="6" fill="#161b22" stroke="#30363d"/>
      <text x="55" y="19" text-anchor="middle" fill="#d29922">pct exec</text>
    </g>
    <g transform="translate(238, 0)">
      <rect x="0" y="0" width="124" height="28" rx="6" fill="#161b22" stroke="#30363d"/>
      <text x="62" y="19" text-anchor="middle" fill="#58a6ff">qm guest exec</text>
    </g>
    <g transform="translate(372, 0)">
      <rect x="0" y="0" width="98" height="28" rx="6" fill="#161b22" stroke="#30363d"/>
      <text x="49" y="19" text-anchor="middle" fill="#f85149">idempotent</text>
    </g>
    <g transform="translate(480, 0)">
      <rect x="0" y="0" width="100" height="28" rx="6" fill="#161b22" stroke="#30363d"/>
      <text x="50" y="19" text-anchor="middle" fill="#a5a5ff">audit log</text>
    </g>
  </g>

  <!-- Right side: decorative key distribution graphic -->
  <g transform="translate(720, 60)">
    <!-- ProxKey hub -->
    <rect x="0" y="68" width="120" height="44" rx="10" fill="#0d1b2e" stroke="#264773"/>
    <text x="60" y="86" text-anchor="middle" font-family="ui-monospace, monospace"
          font-size="13" fill="#58a6ff" font-weight="600">ProxKey</text>
    <text x="60" y="102" text-anchor="middle" font-family="ui-monospace, monospace"
          font-size="10" fill="#8b949e">api · 8000</text>

    <!-- Containers (right column) -->
    <g font-family="ui-monospace, monospace" font-size="11">
      <!-- LXC 1 -->
      <g transform="translate(280, 10)">
        <rect x="0" y="0" width="156" height="32" rx="6" fill="#0f1d14" stroke="#2a5a36"/>
        <text x="10" y="20" fill="#3fb950">LXC 101 · web-01</text>
      </g>
      <!-- LXC 2 -->
      <g transform="translate(280, 50)">
        <rect x="0" y="0" width="156" height="32" rx="6" fill="#0f1d14" stroke="#2a5a36"/>
        <text x="10" y="20" fill="#3fb950">LXC 102 · db-01</text>
      </g>
      <!-- QEMU 1 -->
      <g transform="translate(280, 98)">
        <rect x="0" y="0" width="156" height="32" rx="6" fill="#201a0d" stroke="#5a4520"/>
        <text x="10" y="20" fill="#d29922">QEMU 200 · app-01</text>
      </g>
      <!-- QEMU 2 -->
      <g transform="translate(280, 138)">
        <rect x="0" y="0" width="156" height="32" rx="6" fill="#201a0d" stroke="#5a4520"/>
        <text x="10" y="20" fill="#d29922">QEMU 201 · ci-01</text>
      </g>
      <!-- LXC 3 -->
      <g transform="translate(280, 178)">
        <rect x="0" y="0" width="156" height="32" rx="6" fill="#0f1d14" stroke="#2a5a36"/>
        <text x="10" y="20" fill="#3fb950">LXC 103 · cache-01</text>
      </g>
    </g>

    <!-- Connection lines from hub to containers -->
    <g stroke-width="1.5" fill="none">
      <path d="M120 90 C 200 90, 220 26, 280 26" stroke="#3fb950" opacity="0.7"/>
      <path d="M120 90 C 200 90, 220 66, 280 66" stroke="#3fb950" opacity="0.7"/>
      <path d="M120 90 C 200 90, 220 114, 280 114" stroke="#d29922" opacity="0.7"/>
      <path d="M120 90 C 200 90, 220 154, 280 154" stroke="#d29922" opacity="0.7"/>
      <path d="M120 90 C 200 90, 220 194, 280 194" stroke="#3fb950" opacity="0.7"/>
    </g>

    <!-- Tiny key glyphs along the connection paths -->
    <g fill="#c084fc">
      <circle cx="210" cy="58" r="3"/>
      <circle cx="210" cy="90" r="3"/>
      <circle cx="210" cy="122" r="3"/>
    </g>

    <!-- Caption -->
    <text x="0" y="232" font-family="ui-monospace, 'SF Mono', Menlo, monospace"
          font-size="11" fill="#6e7681">
      one click · every container · authorized_keys written
    </text>
  </g>

  <!-- Bottom ticker line -->
  <g transform="translate(72, 296)" font-family="ui-monospace, 'SF Mono', Menlo, monospace"
     font-size="11" fill="#6e7681">
    <text x="0" y="0">$ docker compose up -d  <tspan fill="#3fb950">✓</tspan>  proxmox · api token · pct exec · qm guest exec · audit · ready</text>
  </g>
</svg>
